basePath: /api/v1
definitions:
  auth.GetNewTokensRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  auth.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  auth.Tokens:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  comment.CreateCommentRequest:
    properties:
      comment:
        type: string
      parent_id:
        type: string
    required:
    - comment
    type: object
  comment.UpdateCommentRequest:
    properties:
      comment:
        type: string
      parent_id:
        type: string
    required:
    - comment
    type: object
  domain.Comment:
    properties:
      content:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        type: string
      is_deleted:
        type: boolean
      parent_id:
        type: string
      train_id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      version:
        type: integer
    type: object
  domain.ErrorResponse:
    properties:
      description:
        type: string
      key:
        type: string
    type: object
  domain.Exercise:
    properties:
      description:
        type: string
      id:
        type: string
      title:
        type: string
    type: object
  domain.Train:
    properties:
      calories:
        type: integer
      category_id:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      difficulty:
        type: string
      duration:
        type: integer
      id:
        type: string
      is_public:
        type: boolean
      title:
        type: string
      type:
        type: string
    type: object
  domain.User:
    properties:
      access_token:
        type: string
      email:
        type: string
      id:
        type: string
      refresh_token:
        type: string
      title:
        type: string
    type: object
  exercises.CreateExerciseRequest:
    properties:
      description:
        type: string
      title:
        type: string
    required:
    - description
    - title
    type: object
  rating.CreateRatingRequest:
    properties:
      rating:
        type: integer
    type: object
  train.CreateTrainRequest:
    properties:
      calories:
        minimum: 0
        type: integer
      difficulty:
        enum:
        - easy
        - medium
        - hard
        type: string
      duration:
        minimum: 1
        type: integer
      is_public:
        type: boolean
      title:
        type: string
      type:
        enum:
        - strength
        - cardio
        - stretching
        type: string
    required:
    - calories
    - difficulty
    - duration
    - title
    - type
    type: object
  train.UpdateTrainRequest:
    properties:
      calories:
        minimum: 0
        type: integer
      difficulty:
        enum:
        - easy
        - medium
        - hard
        type: string
      duration:
        minimum: 1
        type: integer
      is_public:
        type: boolean
      title:
        type: string
      type:
        enum:
        - strength
        - cardio
        - stretching
        type: string
    type: object
  traincategory.CreateTrainCategoryRequest:
    properties:
      title:
        type: string
    required:
    - title
    type: object
  traincategory.CreateTrainCategoryResponse:
    properties:
      category:
        $ref: '#/definitions/traincategory.TrainCategoryDB'
    type: object
  traincategory.TrainCategoryDB:
    properties:
      createdAt:
        type: string
      id:
        type: string
      name:
        type: string
      updatedAt:
        type: string
      version:
        type: integer
    type: object
  traincategory.UpdateTrainCategoryRequest:
    properties:
      title:
        type: string
    required:
    - title
    type: object
host: localhost:7000
info:
  contact:
    url: https://github.com/Sanchir01
  description: This is a gateway server
  termsOfService: http://swagger.io/terms/
  title: "\U0001F680 FITNOW"
  version: 0.0.1
paths:
  /auth/login:
    post:
      description: Login user by email
      parameters:
      - description: Login body json
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User by email
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/register:
    post:
      description: Register user by email
      parameters:
      - description: Register user and return
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Registered user
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Register
      tags:
      - auth
  /auth/token:
    post:
      description: get new tokens by refresh token
      parameters:
      - description: New tokens
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.GetNewTokensRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Registered user
          schema:
            $ref: '#/definitions/auth.Tokens'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: NewTokens
      tags:
      - auth
  /train:
    get:
      description: Get all public trains with pagination
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size (max 100)
        in: query
        name: limit
        type: integer
      produces:
